# DD-005 / DF-001 (DISCHARGED): CI REQUIREMENTS CHARTER for the dafny-compat
# spike's permanent conformance job, co-located with the spike. The LIVE
# GitHub Actions realization is .github/workflows/dafny-compat-spike.yml —
# GitHub requires workflows under .github/workflows/, so the job itself cannot
# live under the spike dir. This charter is the AUTHORITATIVE spec for that job
# (the 5 hard requirements below); keep the two in sync (asserted by
# Inv014OperatorSurfaceTests). Runner RID: linux-x64 — a different RID requires
# new pinned digests and a re-captured committed sample (EA-002/RS-005).
#
# Local enforcement remains `dotnet test` on a warm tree (EA-004: the
# Correctless workflow test command); the live job adds the FROM-CLEAN net.
#
# HARD REQUIREMENTS the live job realizes (QA-023):
#
# 1. FULL-HISTORY CHECKOUT — `fetch-depth: 0` is mandatory. The committed test
#    QA001_CommittedSamples_CleanTreeAncestorCommit shells out to
#    `git merge-base --is-ancestor <sample-commit> HEAD` and FAILS CLOSED on
#    any git error: a shallow checkout (actions/checkout default fetch-depth 1)
#    does not contain the committed samples' generation commit, so the test
#    fails spuriously on depth-1 clones. Any committed test that shells out to
#    repo-history-dependent tooling states its checkout-depth requirement here.
# 2. GIT BINARY — a `git` executable must be on the runner (EA-007): the
#    controller records the commit binding and the QA001 test invokes git.
# 3. ENTRY POINT — `scripts/run-spike.sh` is the ONLY test entry point and its
#    exit code (CONTROLLER_EXIT, fail-closed per QA-008/QA-016) is the gate
#    signal. A bare `dotnet test` step without a prior controller run fails
#    every integration test BY DESIGN (DD-008/TA-B13: tests launch only
#    controller-built, digest-attested artifacts from the run root).
# 4. WALL-CLOCK HEADROOM — the canonical run's committed 1800s bound
#    (config/run-config.json) covers provisioning + cold restore + build + the
#    full suite INCLUDING its nested full-pipeline controller runs. A cold
#    CI runner 2-3x slower than the dev host approaches that bound and would
#    synthesize WallClockExpiry INCOMPLETE: MEASURE the run on the chosen
#    runner class before wiring, and take any bound change through the DD-006
#    evidence procedure (never a silent config edit).
# 5. FROM-CLEAN (PMB-002/AP-021) — the gate MUST run from a checkout with NO
#    accumulated run products: a fresh clone, or `rm -rf out` before the run.
#    Persisting or caching `out/runid-*` run roots (or the `out/current` pointer)
#    between CI runs is FORBIDDEN — a warm `out/` lets the suite pass on leaked
#    prior-run state and masks exactly the bootstrap / accumulated-state defects
#    this gate exists to catch. Both post-merge bugs (PMB-001 exit-127 entry
#    point; PMB-002 the MaIdR22 circular suite-receipt gate) escaped local
#    `dotnet test` on a warm tree; the from-clean run is the structural detector
#    for the whole AP-021 circular-gate class. Only `out/cache` (provisioning:
#    Z3 / net8 runtime / NuGet — no run roots or receipts) MAY be cached, and
#    only when restored into an otherwise-empty `out/`. The gate signal is the
#    CONTROLLER_EXIT of a single from-clean run.
# NOTE: this charter is documentation, not an executed workflow (GitHub only
# runs files under .github/workflows/). The run: lines below mirror the live
# steps in .github/workflows/dafny-compat-spike.yml; that file is the one that
# actually runs.
name: dafny-compat-spike (permanent conformance job — DD-005/DD-006)
on:
  workflow_call: {}
jobs:
  spike:
    runs-on: ubuntu-latest # must be linux-x64 (EA-002)
    steps:
      - name: checkout (REQUIRED fetch-depth 0 — see QA-023 note 1)
        run: 'echo "live: actions/checkout@v4 with fetch-depth: 0 (DF-001/QA-023)"'
      - name: pinned SDK 10.0.302 per spikes/dafny-compat/global.json
        run: 'echo "live: dotnet-install.sh --jsonfile spikes/dafny-compat/global.json --install-dir $HOME/.dotnet"'
      - name: FROM-CLEAN provision -> restore -> build -> test (controller exit is the gate — QA-023 notes 3 + 5)
        run: 'echo "live: rm -rf spikes/dafny-compat/out && env -i HOME=$HOME bash -p spikes/dafny-compat/scripts/run-spike.sh"'
